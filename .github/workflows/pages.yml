name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build custom-domain export
        run: npm run build

      - name: Stage custom-domain export
        run: |
          mkdir pages-out
          cp -R out/. pages-out/
          rm -rf out .next

      - name: Build GitHub project-path export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /csrf-proc

      - name: Stage GitHub project-path export
        run: |
          mkdir -p pages-out/csrf-proc
          cp -R out/. pages-out/csrf-proc/
          rm -rf out .next

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-out

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
